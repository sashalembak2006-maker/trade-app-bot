# Railway: сервіс @trade-app/bot
# Dashboard → Service → Settings → Config file path: apps/bot/railway.toml
# Додатково: Variable RAILWAY_DOCKERFILE_TARGET = bot

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"
watchPatterns = ["apps/bot/**", "packages/shared/**", "Dockerfile"]

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
