# DEPRECATED — bot runs inside prime-trade container (scripts/start-railway.sh).
# Production URL: https://prime-trade-production.up.railway.app
#
# Auto-deploy disabled: only prime-trade should deploy on git push.

[build]
builder = "NIXPACKS"
watchPatterns = [".railway-no-deploy"]
buildCommand = "npm ci && npm run build -w @trade-app/shared && npm run build -w @trade-app/bot"

[deploy]
startCommand = "npm run start -w @trade-app/bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
