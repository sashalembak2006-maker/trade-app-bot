# Railway @trade-app/bot — root directory = корінь репо

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build -w @trade-app/shared && npm run build -w @trade-app/bot"

[deploy]
startCommand = "npm run start -w @trade-app/bot"
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
