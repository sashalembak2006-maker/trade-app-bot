# ОДИН сервіс на Railway = API + Bot разом. Видали зайві сервіси (web, bot, collector).

[build]
builder = "NIXPACKS"
buildCommand = "npm ci && npm run build -w @trade-app/shared && npm run build -w @trade-app/api && npm run build -w @trade-app/bot && npm run db:generate -w @trade-app/api"

[deploy]
startCommand = "npm run start:railway"
healthcheckPath = "/health"
healthcheckTimeout = 300
restartPolicyType = "ON_FAILURE"
