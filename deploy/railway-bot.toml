# Railway — сервіс Bot (другий сервіс у тому ж проєкті)
# Variables → RAILWAY_DOCKERFILE_TARGET = bot
# API_URL = публічний URL API-сервісу (напр. https://prime-api-production.up.railway.app)

[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
